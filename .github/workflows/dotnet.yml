# ============================================================
#  Trion Continuous Integration (CI) Workflow
# ------------------------------------------------------------
#  This workflow builds and publishes the Trion.Web project
#  on every push or pull request to `main` or `dev` branches.
#
#  The legacy Trion.Desktop (MAUI) project has been removed.
#  Only the Blazor Server build is now maintained and deployed.
# ============================================================

name: Trion CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    # ---------------------------------------------------------
    # Run build matrix on both Windows and Linux
    # - Ubuntu ensures Linux compatibility for hosting
    # - Windows ensures cross-platform consistency
    # ---------------------------------------------------------
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      # -------------------------------------------------------
      # Step 1: Checkout repository
      # -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Step 2: Setup .NET 9 SDK
      # -------------------------------------------------------
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      # -------------------------------------------------------
      # Step 3: Global build environment config
      #   - Disable telemetry
      #   - Disable GUI popups for build errors
      #   - Treat warnings as errors to enforce code quality
      # -------------------------------------------------------
      - name: Configure build environment
        run: |
          echo "DOTNET_CLI_TELEMETRY_OPTOUT=1" >> $GITHUB_ENV
          echo "DOTNET_DISABLE_GUI_ERRORS=1" >> $GITHUB_ENV
          echo "TreatWarningsAsErrors=true" >> Directory.Build.props

      # -------------------------------------------------------
      # Step 4: Restore NuGet dependencies
      # -------------------------------------------------------
      - name: Restore dependencies
        run: dotnet restore

      # -------------------------------------------------------
      # Step 5: Build all projects in Release mode
      # -------------------------------------------------------
      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      # -------------------------------------------------------
      # Step 6: Publish only the Trion.Web project
      # -------------------------------------------------------
      - name: Publish Trion.Web (Blazor Server)
        run: dotnet publish src/Trion.Web/Trion.Web.csproj -c Release -o artifacts/web --no-restore

      # -------------------------------------------------------
      # Step 7: Upload the published Web build as an artifact
      #   - This makes it downloadable in GitHub Actions
      #   - Useful for testing, staging, or manual deployments
      # -------------------------------------------------------
      - name: Upload published web artifact
        uses: actions/upload-artifact@v4
        with:
          name: trion-web
          path: artifacts/web
